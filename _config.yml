#-------------------------------
# General Site Settings
baseurl: "" # The subpath of your site, e.g. /blog
url: "https://pemblabs.net" # The base hostname & protocol for your site, e.g. http://example.com


#-------------------------------
# Build settings
markdown: kramdown
permalink: /:title
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-tagging

# Per-tag archive pages (see _layouts/tag_page.html)
tag_page_layout: tag_page
tag_page_dir: tag
tag_permalink_style: pretty

paginate: 8
paginate_path: "/page/:num"

# Pages Path
defaults:
  - scope:
      path: '_pages'
    values:
      permalink: /:basename:output_ext

include:
  - _pages

sass:
  sass_dir: _sass
  style: compressed